<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Hóa Đơn | Hotel</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span>+84 123 456 789 &nbsp;|&nbsp; info@hotel.local</span>
    </div>
</div>

<header>
    <a href="/home" class="logo">
        <img src="/logo.jpg" alt="Hotel Logo">
    </a>
    <nav class="nav-menu admin-nav">
        <a href="/admin/phong">Phòng</a>
        <a href="/admin/loai-phong">Loại Phòng</a>
        <a href="/admin/dat-phong">Đơn Đặt Phòng</a>
        <a href="/admin/hoa-don" class="active">Hóa Đơn</a>
        <a href="/admin/nhan-vien">Nhân Viên</a>
        <a href="/admin/khuyen-mai">Khuyến Mãi</a>
        <a href="/admin/danh-gia">Đánh Giá</a>
        <a href="/admin/nguoi-dung">Người Dùng</a>
    </nav>
    <div class="header-actions">
        <a href="/logout" class="btn btn-outline">Đăng Xuất</a>
    </div>
</header>

<main class="admin-wrapper">
    <div class="admin-header">
        <h1>Quản Lý Hóa Đơn</h1>
        <a th:href="@{/admin/hoa-don}" class="admin-btn outline">Làm Mới Form</a>
    </div>

    <div th:if="${success}" class="admin-message success">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="admin-message error">
        <span th:text="${error}"></span>
    </div>

    <section class="admin-panel">
        <h2 th:text="${title}">Thêm hóa đơn</h2>

        <form th:action="@{/admin/hoa-don/save}" th:object="${hoaDon}" method="post">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">

            <input type="hidden" name="maDatPhong" th:value="${hoaDon.d != null ? hoaDon.d.id : ''}">
            <input type="hidden" name="maKhuyenMai" th:value="${hoaDon.k != null ? hoaDon.k.id : ''}">
            <input type="hidden" name="maNhanVienXuat" th:value="${hoaDon.n != null ? hoaDon.n.maNguoiDung : ''}">

            <div class="admin-grid">
                <div class="admin-field">
                    <label>Đơn đặt phòng</label>
                    <select th:disabled="${hoaDon.id != 0}">
                        <option value="">-- Chọn đơn --</option>
                        <option th:each="dp : ${datPhongs}"
                                th:value="${dp.id}"
                                th:text="${'#' + dp.id + ' - ' + (dp.n != null ? dp.n.hoTen : '')}"
                                th:selected="${hoaDon.d != null and hoaDon.d.id == dp.id}">
                        </option>
                    </select>
                </div>
                <div class="admin-field">
                    <label>Khuyến mãi</label>
                    <select th:disabled="${hoaDon.id != 0}">
                        <option value="">-- Không áp dụng --</option>
                        <option th:each="km : ${khuyenMais}"
                                th:value="${km.id}"
                                th:text="${km.promoCode}"
                                th:selected="${hoaDon.k != null and hoaDon.k.id == km.id}">
                        </option>
                    </select>
                </div>
                <div class="admin-field">
                    <label>Nhân viên xuất</label>
                    <select th:disabled="${hoaDon.id != 0}" name="maNhanVienXuat">
                        <option value="">-- Chọn nhân viên --</option>
                        <option th:each="nd : ${nguoiDungs}"
                                th:value="${nd.maNguoiDung}"
                                th:text="${nd.hoTen + ' - ' + nd.email}"
                                th:selected="${hoaDon.n != null and hoaDon.n.maNguoiDung == nd.maNguoiDung}">
                        </option>
                    </select>
                </div>
                <div class="admin-field">
                    <label>Tiền phòng</label>
                    <input type="number" th:field="*{tienPhong}" th:readonly="${hoaDon.id != 0}">
                </div>
                <div class="admin-field">
                    <label>Tiền dịch vụ</label>
                    <input type="number" th:field="*{tienDichVu}" th:readonly="${hoaDon.id != 0}">
                </div>
                <div class="admin-field">
                    <label>Tiền giảm</label>
                    <input type="number" th:field="*{tienGiam}" th:readonly="${hoaDon.id != 0}">
                </div>
                <div class="admin-field">
                    <label>Tiền VAT</label>
                    <input type="number" th:field="*{tienVat}" th:readonly="${hoaDon.id != 0}">
                </div>
                <div class="admin-field">
                    <label>Tổng tiền</label>
                    <input type="number" th:field="*{tongTien}" th:readonly="${hoaDon.id != 0}">
                </div>
                <div class="admin-field">
                    <div class="admin-field">
                        <label>Đã thanh toán</label>
                        <input type="number" th:field="*{daThanhToan}"
                               min="0" step="1000"
                               th:disabled="${hoaDon.daThanhToan != null and hoaDon.tongTien != null
                      and hoaDon.daThanhToan.compareTo(hoaDon.tongTien) >= 0}">

                        <input type="hidden" th:field="*{daThanhToan}">
                    </div>
                </div>
                <div class="admin-field full">
                    <label>Ghi chú</label>
                    <textarea th:field="*{ghiChu}" th:readonly="${hoaDon.id != 0}"></textarea>
                </div>
            </div>

            <div class="admin-actions">
                <button type="submit" class="admin-btn">Lưu Hóa Đơn</button>
                <a th:href="@{/admin/hoa-don}" class="admin-btn outline">Hủy</a>
            </div>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 Hotel. All rights reserved.</p>
</footer>

</body>
</html>
