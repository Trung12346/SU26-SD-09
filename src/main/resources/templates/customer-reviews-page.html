<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel | Đánh giá khách hàng</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #fafafa;
        }

        .reviews-page-heading {
            padding: 44px 5% 22px;
            background: var(--sky-light, #EBF5FB);
            border-bottom: 1px solid var(--border-color, #e0e0e0);
        }

        .reviews-page-heading-inner {
            max-width: 1180px;
            margin: 0 auto;
        }

        .reviews-page-heading h1 {
            color: var(--text-dark, #333);
            font-size: 34px;
            margin-bottom: 8px;
        }

        .reviews-page-heading p {
            color: var(--text-gray, #666);
            max-width: 720px;
            margin: 0;
            line-height: 1.7;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/headers/app-header :: appHeader}"></div>

<main>
    <section class="reviews-page-heading">
        <div class="reviews-page-heading-inner">
            <h1>Đánh giá khách hàng</h1>
            <p>Xem các đánh giá đã được duyệt và gửi chia sẻ của bạn sau khi sử dụng dịch vụ.</p>
        </div>
    </section>

    <div th:replace="~{fragments/customer-reviews :: customerReviews}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
